# dosbox.conf — colocar en apellido-post1-u5/dosbox.conf 
 
[cpu] 
core=normal 
cputype=auto 
cycles=8000       # velocidad adecuada para trabajo ágil con NASM 
 
[dosbox] 
memsize=16 
 
[render] 
scaler=normal2x   # escala la ventana 2x para mejor visibilidad

[autoexec]
# Montar el directorio del proyecto como unidad C: 
# AJUSTAR la ruta al directorio real en el sistema anfitrión 
mount c "C:\Users\DELL\solano-post1-u5"
c: 
echo DOSBox listo. Directorio de trabajo: C:\ 
cls 